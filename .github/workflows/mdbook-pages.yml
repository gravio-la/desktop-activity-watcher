# Build the mdBook under doc/ with Nix and publish to GitHub Pages.
# Repository Settings → Pages: Source = GitHub Actions.

name: Deploy documentation (mdBook)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-mdbook
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30

      - name: Build mdBook
        run: nix build .#book --print-build-logs

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: result/share/doc/desktop-agent/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
